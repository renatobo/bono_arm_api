name: Release Plugin Zip

on:
  push:
    tags:
      - 'v*'

jobs:
  zip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: release_meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_FILE="release-notes/${VERSION}.md"
          if [[ ! -f "$NOTES_FILE" ]]; then
            echo "Missing release notes file: $NOTES_FILE"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Build plugin package
        id: build
        run: |
          chmod +x build.sh
          ZIP_PATH="$(./build.sh | sed -n 's/^Created //p')"
          if [[ -z "$ZIP_PATH" || ! -f "$ZIP_PATH" ]]; then
            echo "Failed to locate built zip file."
            exit 1
          fi
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build.outputs.zip_path }}
          body_path: ${{ steps.release_meta.outputs.notes_file }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
